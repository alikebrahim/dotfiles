include-file = ~/.config/polybar/colors.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 26
override-redirect = true
radius = 0
fixed-center = true
bottom = false
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = Noto Emoji:size=10;2
font-2 = Noto Sans Symbols 2:size=10;2
modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio network bluetooth cpu memory battery
cursor-click = pointer
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding = 2
label-urgent = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %A, %d %B %Y
time = %H:%M:%S
date-alt = %Y-%m-%d
time-alt = %H:%M:%S
label = %{A3:/home/alikebrahim/.config/scripts/rofi-calendar.sh:}%date% %time%%{A}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = %{A1:/home/alikebrahim/.config/scripts/rofi-audio-menu.sh:} %percentage%%%{A}
label-muted = %{A1:/home/alikebrahim/.config/scripts/rofi-audio-menu.sh:}%{A}
click-left = /home/alikebrahim/.config/scripts/rofi-audio-menu.sh
click-right = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5

[module/network]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
label-connected = %{A1:/home/alikebrahim/.config/scripts/rofi-wifi-menu.sh:}󰖩 %essid%%{A}
format-disconnected = <label-disconnected>
label-disconnected = %{A1:/home/alikebrahim/.config/scripts/rofi-wifi-menu.sh:}󰖪 No Wi-Fi%{A}
click-left = /home/alikebrahim/.config/scripts/rofi-wifi-menu.sh
click-right = /home/alikebrahim/.config/scripts/rofi-wifi-menu.sh

[module/bluetooth]
type = custom/script
exec = /home/alikebrahim/.config/scripts/polybar-bluetooth-status.sh
interval = 5
click-left = /home/alikebrahim/.config/scripts/rofi-bluetooth-menu.sh
click-right = rfkill unblock bluetooth && bluetoothctl power on

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 2
label = Memory %percentage_used%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
poll-interval = 5
format-charging = %{A1:/home/alikebrahim/.config/scripts/rofi-power-menu.sh:}<label-charging>%{A}
format-discharging = %{A1:/home/alikebrahim/.config/scripts/rofi-power-menu.sh:}<label-discharging>%{A}
format-full = %{A1:/home/alikebrahim/.config/scripts/rofi-power-menu.sh:}<label-full>%{A}
label-charging =  %percentage%%
label-discharging =  %percentage%%
label-full =  %percentage%%
click-left = /home/alikebrahim/.config/scripts/rofi-power-menu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
