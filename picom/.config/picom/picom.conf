# Picom compositor configuration for AwesomeWM/X11
# Target: Fedora picom v13, AwesomeWM 4.3, NVIDIA hybrid laptop.
# First-step conservative modern profile: GLX, vsync, light shadows,
# rounded corners, and dual_kawase blur without external forks.

#################################
# Backend / sync
#################################
backend = "glx";
vsync = true;
use-damage = true;

# NVIDIA/GLX-friendly defaults. Keep fullscreen redirection stable first;
# only enable unredir later if gaming/video performance needs it.
unredir-if-possible = false;

#################################
# Window detection
#################################
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

#################################
# Shadows
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = 0;
shadow-offset-y = 4;
shadow-opacity = 0.35;

#################################
# Fading
#################################
fading = true;
fade-in-step = 0.045;
fade-out-step = 0.045;
fade-delta = 6;

#################################
# Corners
#################################
corner-radius = 8;

#################################
# Blur
#################################
blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

#################################
# Opacity
#################################
frame-opacity = 1.0;

#################################
# Animations
#################################
# Smooth but snappy modern animations
animations = ({
  triggers = [ "open", "show" ];
  preset = "appear";
  scale = 0.9;
  duration = 0.25;
}, {
  triggers = [ "close", "hide" ];
  preset = "disappear";
  scale = 0.9;
  duration = 0.2;
});

#################################
# Picom v13 rule system
#################################
rules: ({
  match = "window_type = 'dock' || window_type = 'desktop' || fullscreen";
  corner-radius = 0;
  shadow = false;
  blur-background = false;
}, {
  match = "class_g = 'Polybar'";
  corner-radius = 0;
  shadow = false;
  blur-background = false;
}, {
  match = "class_g ?= 'rofi' || class_i ?= 'rofi' || name *?= 'rofi'";
  shadow = true;
  corner-radius = 10;
  blur-background = true;
}, {
  match = "class_g ?= 'dunst' || class_i ?= 'dunst' || name = 'Notification'";
  shadow = false;
  corner-radius = 8;
  blur-background = true;
});
