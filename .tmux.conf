# # # # # # # # # # # # # # # # 
# # # #  Key Bindings # # # # # 
# Send prefix
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix
 
# Use Alt-arrow keys to switch panes
bind -n M-l select-pane -L
bind -n M-h select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
 
# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window
 
# Set easier window split keys
bind-key | split-window -h
bind-key - split-window -v
unbind '"'
unbind %

# Vi keys
setw -g mode-keys vi

# # # # # # # # # # # # # # # # 
# # # # #  Options  # # # # # # 
# Mouse mode
set -g mouse on

# # # # # # # # # # # # # # # # 
# # # # #  Theme #  # # # # # # 
# Status line 
set -g status-style bg=cyan
set -g status-position top
 
 # Active/Inactive pane colors
set -g pane-active-border fg=green
set -g window-active-style bg='#1c1c1c'
set -g window-style bg='#282828'
set -g pane-border-lines heavy
set -g pane-border-style fill=black
set -g pane-border-status bottom

# config reload
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# copy test
bind y run -b "tmux save-buffer - | xclip -i -selection clipboard"

bind Enter copy-mode # enter copy mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
